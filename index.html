<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coming Soon</title>

<style>
body {
  margin: 0;
  height: 100vh;
  font-family: Arial, sans-serif;
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  background: radial-gradient(circle at center, #0a2a2f, #02090d);
  overflow: hidden;
}

/* Blur glow background */
body::before {
  content: "";
  position: absolute;
  width: 600px;
  height: 600px;
  background: #00ffb3;
  filter: blur(200px);
  opacity: 0.2;
}

/* Center content */
.container {
  text-align: center;
  z-index: 1;
}

/* Logo */
.logo {
  font-size: 60px;
  font-weight: bold;
  margin-bottom: 10px;
}

.logo span {
  color: #00ffb3;
}

/* Title */
h1 {
  font-size: 48px;
  margin: 10px 0;
}

/* Subtitle */
p {
  color: #aaa;
  margin-bottom: 40px;
}

/* Countdown boxes */
.countdown {
  display: flex;
  gap: 20px;
  justify-content: center;
}

.box {
  width: 120px;
  height: 120px;
  border-radius: 15px;
  border: 1px solid rgba(255,255,255,0.2);
  backdrop-filter: blur(10px);
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}

.box h2 {
  font-size: 36px;
  margin: 0;
}

.box span {
  font-size: 12px;
  color: #bbb;
  letter-spacing: 2px;
}
</style>
</head>

<body>

<div class="container">
  <div class="logo"><span>M</span></div>
  <h1>MintHost</h1>
  <p>Fast and powerful hosting is coming soon.</p>

  <div class="countdown">
    <div class="box">
      <h2 id="days">00</h2>
      <span>DAYS</span>
    </div>
    <div class="box">
      <h2 id="hours">00</h2>
      <span>HOURS</span>
    </div>
    <div class="box">
      <h2 id="minutes">00</h2>
      <span>MINUTES</span>
    </div>
    <div class="box">
      <h2 id="seconds">00</h2>
      <span>SECONDS</span>
    </div>
  </div>
</div>

<script>
// SET YOUR LAUNCH DATE HERE
const launchDate = new Date("2026-05-01T00:00:00").getTime();

const timer = setInterval(() => {
  const now = new Date().getTime();
  const distance = launchDate - now;

  const days = Math.floor(distance / (1000 * 60 * 60 * 24));
  const hours = Math.floor((distance / (1000 * 60 * 60)) % 24);
  const minutes = Math.floor((distance / (1000 * 60)) % 60);
  const seconds = Math.floor((distance / 1000) % 60);

  document.getElementById("days").innerText = String(days).padStart(2, '0');
  document.getElementById("hours").innerText = String(hours).padStart(2, '0');
  document.getElementById("minutes").innerText = String(minutes).padStart(2, '0');
  document.getElementById("seconds").innerText = String(seconds).padStart(2, '0');

  if (distance < 0) {
    clearInterval(timer);
    document.querySelector(".countdown").innerHTML = "🚀 We are live!";
  }
}, 1000);
</script>

</body>
</html>
