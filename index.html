<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flyer - Coming Soon</title>

<style>
body {
  margin: 0;
  height: 100vh;
  font-family: Arial, sans-serif;
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  background: radial-gradient(circle at center, #1e73e8, #0b1c3a);
  overflow: hidden;
}

/* glow effect */
body::before {
  content: "";
  position: absolute;
  width: 700px;
  height: 700px;
  background: #ffffff;
  filter: blur(180px);
  opacity: 0.08;
}

/* container */
.container {
  text-align: center;
  z-index: 1;
}

/* logo */
.logo {
  width: 120px;
  margin-bottom: 20px;
  filter: drop-shadow(0 0 15px rgba(255,255,255,0.3));
}

/* title */
h1 {
  font-size: 48px;
  margin: 10px 0;
}

/* subtitle */
p {
  color: #d0d0d0;
  margin-bottom: 40px;
}

/* countdown */
.countdown {
  display: flex;
  gap: 20px;
  justify-content: center;
  flex-wrap: wrap;
}

.box {
  width: 120px;
  height: 120px;
  border-radius: 15px;
  border: 1px solid rgba(255,255,255,0.25);
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(12px);
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  transition: 0.3s;
}

.box:hover {
  transform: translateY(-5px);
  border-color: white;
}

.box h2 {
  font-size: 36px;
  margin: 0;
}

.box span {
  font-size: 12px;
  letter-spacing: 2px;
  color: #ccc;
}
</style>
</head>

<body>

<div class="container">
  <img src="Untitled design (1).png" class="logo" alt="Flyer Logo">

  <h1>Flyer</h1>
  <p>We're launching something fast. Stay tuned.</p>

  <div class="countdown">
    <div class="box">
      <h2 id="days">00</h2>
      <span>DAYS</span>
    </div>
    <div class="box">
      <h2 id="hours">00</h2>
      <span>HOURS</span>
    </div>
    <div class="box">
      <h2 id="minutes">00</h2>
      <span>MINUTES</span>
    </div>
    <div class="box">
      <h2 id="seconds">00</h2>
      <span>SECONDS</span>
    </div>
  </div>
</div>

<script>
// AUTO SET: 2 weeks from now
const launchDate = new Date().getTime() + (14 * 24 * 60 * 60 * 1000);

const timer = setInterval(() => {
  const now = new Date().getTime();
  const distance = launchDate - now;

  const days = Math.floor(distance / (1000 * 60 * 60 * 24));
  const hours = Math.floor((distance / (1000 * 60 * 60)) % 24);
  const minutes = Math.floor((distance / (1000 * 60)) % 60);
  const seconds = Math.floor((distance / 1000) % 60);

  document.getElementById("days").innerText = String(days).padStart(2, '0');
  document.getElementById("hours").innerText = String(hours).padStart(2, '0');
  document.getElementById("minutes").innerText = String(minutes).padStart(2, '0');
  document.getElementById("seconds").innerText = String(seconds).padStart(2, '0');

  if (distance < 0) {
    clearInterval(timer);
    document.querySelector(".countdown").innerHTML = "🚀 We are live!";
  }
}, 1000);
</script>

</body>
</html>
