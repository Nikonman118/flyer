<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flyer - Coming Soon</title>

<style>
body {
  margin: 0;
  height: 100vh;
  font-family: Arial, sans-serif;
  color: white;

  /* YOUR BANNER AS BACKGROUND */
  background: url("Untitled design (2).png") no-repeat center center/cover;

  display: flex;
  justify-content: center;
  align-items: center;
}

/* dark overlay so text is readable */
.overlay {
  position: absolute;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.4);
}

/* content */
.container {
  position: relative;
  text-align: center;
  z-index: 1;
}

/* logo */
.logo {
  width: 140px;
  margin-bottom: 20px;
  filter: drop-shadow(0 0 20px rgba(255,255,255,0.4));
}

/* title */
h1 {
  font-size: 48px;
  margin: 10px 0;
}

/* subtitle */
p {
  color: #ddd;
  margin-bottom: 40px;
}

/* countdown */
.countdown {
  display: flex;
  gap: 20px;
  justify-content: center;
  flex-wrap: wrap;
}

.box {
  width: 110px;
  height: 110px;
  border-radius: 12px;
  border: 1px solid rgba(255,255,255,0.3);
  background: rgba(0,0,0,0.4);
  backdrop-filter: blur(8px);
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}

.box h2 {
  margin: 0;
  font-size: 34px;
}

.box span {
  font-size: 12px;
  letter-spacing: 2px;
  color: #ccc;
}
</style>
</head>

<body>

<div class="overlay"></div>

<div class="container">
  <!-- CENTER LOGO -->
  <img src="Untitled design (1).png" class="logo" alt="Flyer Logo">

  <h1>Flyer</h1>
  <p>Flyer Discord Management launching soon.</p>

  <!-- COUNTDOWN -->
  <div class="countdown">
    <div class="box">
      <h2 id="days">00</h2>
      <span>DAYS</span>
    </div>
    <div class="box">
      <h2 id="hours">00</h2>
      <span>HOURS</span>
    </div>
    <div class="box">
      <h2 id="minutes">00</h2>
      <span>MINUTES</span>
    </div>
    <div class="box">
      <h2 id="seconds">00</h2>
      <span>SECONDS</span>
    </div>
  </div>
</div>

<script>
// 2 week countdown
const launchDate = new Date().getTime() + (14 * 24 * 60 * 60 * 1000);

setInterval(() => {
  const now = new Date().getTime();
  const distance = launchDate - now;

  document.getElementById("days").innerText =
    String(Math.floor(distance / (1000*60*60*24))).padStart(2,'0');

  document.getElementById("hours").innerText =
    String(Math.floor((distance / (1000*60*60)) % 24)).padStart(2,'0');

  document.getElementById("minutes").innerText =
    String(Math.floor((distance / (1000*60)) % 60)).padStart(2,'0');

  document.getElementById("seconds").innerText =
    String(Math.floor((distance / 1000) % 60)).padStart(2,'0');

}, 1000);
</script>

</body>
</html>
